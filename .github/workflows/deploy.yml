# 동산기획 ERP+MES — 자동 검증 + 배포 + 헬스체크
#
# Trigger:
#   - main 브랜치 push  → 검증 → 프로덕션 배포 → 스모크 헬스체크
#   - 수동 실행 (workflow_dispatch)
#
# 필요한 GitHub Secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   Cloudflare 대시보드 → My Profile → API Tokens
#                          → "Edit Cloudflare Workers" 템플릿으로 생성
#                          (Account: All accounts, Zone resources: 불필요)
#   CLOUDFLARE_ACCOUNT_ID  Cloudflare 대시보드 우측 사이드바에서 복사
#   SMOKE_USER  (선택)    스모크 테스트용 계정 — 미설정 시 'admin'
#   SMOKE_PASS  (선택)    스모크 테스트용 비밀번호 — 미설정 시 'password'
#
# 실패 시 동작:
#   - typecheck/build 실패 → 배포 차단
#   - 배포 실패 → 워크플로우 실패 (수동 재실행 필요)
#   - 스모크 실패 → 워크플로우 실패 알림 (자동 롤백은 하지 않음, 수동 대응)

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    name: Verify, Deploy & Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npx vite build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=webapp --branch=main

      - name: Wait for deployment to propagate
        run: sleep 20

      - name: Smoke test (production)
        env:
          SMOKE_URL: https://webapp-9i0.pages.dev
          SMOKE_USER: ${{ secrets.SMOKE_USER || 'admin' }}
          SMOKE_PASS: ${{ secrets.SMOKE_PASS || 'password' }}
          SMOKE_CONCURRENCY: '4'
        run: node scripts/smoke.cjs
        continue-on-error: false

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::배포 또는 스모크 실패. 즉시 확인 필요."
          echo "Production URL: https://webapp-9i0.pages.dev"
          echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
